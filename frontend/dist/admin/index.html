<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <script type="module" crossorigin src="/assets/adminLogin-BwAoU2sc.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/theme-Dz6HwMwx.js">
  <link rel="stylesheet" crossorigin href="/assets/theme-B-p3LV82.css">
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">Q&A Admin</span>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle">☾</button>
    </div>
  </nav>

  <div class="container" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 64px);">
    <div style="width:100%;max-width:380px;">
      <h1 style="font-size:1.75rem;font-weight:700;text-align:center;margin-bottom:0.5rem;">Sign In</h1>
      <p style="text-align:center;color:var(--text-muted);margin-bottom:2rem;">Moderator access only</p>

      <form id="login-form" class="card" style="padding:2rem;">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" class="input" type="text" autocomplete="username" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" autocomplete="current-password">
        </div>
        <div id="error" class="alert alert-error" style="display:none;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">
          Sign In
        </button>
      </form>
    </div>
  </div>

</body>
</html>
