<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    .event-card { margin-bottom: 0.75rem; }
    .event-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
    .event-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.25rem; }
    .event-code { font-size: 0.82rem; color: var(--text-muted); }
    .event-card-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  </style>
  <script type="module" crossorigin src="/assets/adminDashboard-BmJfdRCy.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/theme-Dz6HwMwx.js">
  <link rel="stylesheet" crossorigin href="/assets/theme-B-p3LV82.css">
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">Q&amp;A Admin</span>
    <div class="nav-actions">
      <a id="users-link" href="/users/" class="btn btn-ghost btn-sm" style="display:none;">Users</a>
      <span id="user-name" style="font-size:0.82rem;color:var(--text-muted);"></span>
      <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
      <button class="theme-toggle" id="theme-toggle">☾</button>
    </div>
  </nav>

  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <h1 style="font-size:1.5rem;font-weight:700;">My Events</h1>
      <button id="show-create" class="btn-fab" title="New Event">+</button>
    </div>

    <div id="create-section" class="card create-section">
      <h2 style="font-size:1rem;font-weight:600;margin-bottom:1rem;">Create Event</h2>
      <form id="create-form">
        <div class="form-group">
          <label for="event-name">Event Name</label>
          <input id="event-name" class="input" type="text" placeholder="e.g. Team All-Hands Q&amp;A" required>
        </div>
        <button type="submit" class="btn btn-primary">Create</button>
      </form>
    </div>

    <div id="events-list"></div>
  </div>

</body>
</html>
