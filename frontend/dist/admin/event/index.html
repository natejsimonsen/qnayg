<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moderate Event</title>
  <style>
    .event-header { margin-bottom: 1.75rem; }
    .event-meta { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .code-display {
      font-family: monospace; font-size: 1.4rem; font-weight: 700;
      letter-spacing: 0.2em; color: var(--primary);
      background: var(--bg-secondary); padding: 0.2rem 0.7rem; border-radius: 0.5rem;
    }

    .mod-section { margin-bottom: 2rem; }
    .section-header {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 0.75rem;
    }
    .section-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    .section-count {
      background: var(--bg-secondary); color: var(--text-muted);
      border-radius: 9999px; padding: 0.1rem 0.55rem; font-size: 0.75rem; font-weight: 700;
    }

    .question-mod-card { margin-bottom: 0.6rem; position: relative; }
    .q-text { font-size: 0.95rem; margin-bottom: 0.35rem; line-height: 1.45; }
    .q-author-small { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.75rem; }
    .mod-actions { display: flex; gap: 0.5rem; }
    .q-votes-badge {
      position: absolute; top: 1rem; right: 1rem;
      background: var(--bg-secondary); color: var(--primary);
      border-radius: 9999px; padding: 0.1rem 0.55rem; font-size: 0.82rem; font-weight: 700;
    }

    .status-badge {
      display: inline-block; border-radius: 9999px;
      padding: 0.1rem 0.55rem; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.35rem;
    }
    .status-answered { background: var(--alert-success-bg); color: var(--text-muted); border: 1px solid var(--alert-success-border); }
    .status-rejected { background: var(--bg-secondary); color: var(--text-muted); border: 1px solid var(--border); }

    /* QR Modal */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: var(--card-bg); border-radius: 1rem;
      padding: 2rem; text-align: center; max-width: 320px; width: 90%;
      border: 1px solid var(--border);
    }
    .modal-content img { border-radius: 0.5rem; width: 240px; height: 240px; }
    .modal-title { font-weight: 600; margin-bottom: 1rem; }
    .modal-code { font-family: monospace; font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; }
  </style>
  <script type="module" crossorigin src="/assets/adminEvent-1pCtaVuO.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/theme-C-Ch8ZGE.js">
  <link rel="stylesheet" crossorigin href="/assets/theme-Cirn_R8O.css">
</head>
<body>
  <nav class="nav">
    <a href="/dashboard/" class="nav-brand">← Dashboard</a>
    <div class="nav-actions">
      <button id="presenter-btn" class="btn btn-ghost btn-sm">Presenter View</button>
      <button class="theme-toggle" id="theme-toggle">☾</button>
    </div>
  </nav>

  <div class="container">
    <div class="event-header">
      <h1 id="event-title" style="font-size:1.5rem;font-weight:700;">Loading...</h1>
      <div class="event-meta">
        <div class="code-display" id="event-code">------</div>
        <button id="qr-btn" class="btn btn-ghost btn-sm">QR Code</button>
      </div>
    </div>

    <div class="mod-section">
      <div class="section-header">
        <span class="section-title">Queue</span>
        <span class="section-count" id="pending-count">0</span>
      </div>
      <div id="pending-list"></div>
    </div>

    <div class="mod-section">
      <div class="section-header">
        <span class="section-title">Live — sorted by votes</span>
        <span class="section-count" id="approved-count">0</span>
      </div>
      <div id="approved-list"></div>
    </div>

    <div class="mod-section">
      <div class="section-header">
        <span class="section-title">History</span>
        <span class="section-count" id="done-count">0</span>
      </div>
      <div id="done-list"></div>
    </div>
  </div>

  <!-- QR Modal -->
  <div id="qr-modal" class="modal">
    <div class="modal-content">
      <p class="modal-title">Scan to join</p>
      <p class="modal-code" id="event-code-modal"></p>
      <img id="qr-img" src="" alt="QR Code" style="display:block;margin:0 auto 1rem;">
      <button id="qr-close" class="btn btn-ghost" style="width:100%;justify-content:center;">Close</button>
    </div>
  </div>

  <!-- Presenter View -->
  <div id="presenter-overlay" class="presenter-overlay" style="display:none">
    <div class="presenter-header">
      <span class="presenter-event-name" id="presenter-title"></span>
      <button id="presenter-close" class="btn btn-ghost btn-sm">Exit Presenter</button>
    </div>
    <div class="presenter-list" id="presenter-list"></div>
  </div>

</body>
</html>
