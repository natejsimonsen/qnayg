<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join a Session</title>
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">Q&A</span>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle">☾</button>
    </div>
  </nav>

  <div class="container" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 64px);">
    <div style="width:100%;max-width:420px;">
      <h1 style="font-size:2rem;font-weight:700;text-align:center;margin-bottom:0.5rem;">Join a Session</h1>
      <p style="text-align:center;color:var(--text-muted);margin-bottom:2rem;">Enter the event code to ask questions</p>

      <form id="join-form" class="card" style="padding:2rem;">
        <div class="form-group">
          <label for="code-input">Event Code</label>
          <input
            id="code-input"
            class="input"
            type="text"
            placeholder="e.g. ABC123"
            autocomplete="off"
            autocapitalize="characters"
            maxlength="6"
            style="font-size:1.5rem;text-align:center;letter-spacing:0.2em;font-weight:700;"
          >
        </div>
        <div id="error" class="alert alert-error" style="display:none;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">
          Join →
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="/src/join.js"></script>
</body>
</html>
