services:
  api:
    build: ./api
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET}
      SUPERUSER_USERNAME: ${SUPERUSER_USERNAME}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD}
      DB_PATH: ${DB_PATH:-/data/slido.db}
      MAIN_DOMAIN: ${MAIN_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    volumes:
      - sqlite_data:/data
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      args:
        MAIN_DOMAIN: ${MAIN_DOMAIN}
        ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      MAIN_DOMAIN: ${MAIN_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      API_PORT: ${API_PORT:-8080}
    networks:
      - app
    depends_on:
      - api

networks:
  app:

volumes:
  sqlite_data:
